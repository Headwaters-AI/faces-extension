<!DOCTYPE html>
<html>
<head>
  <title>Connection Failed</title>
  <style>
    body { font-family: sans-serif; padding: 48px; max-width: 480px; color: #333; }
    h2 { color: #c62828; margin-top: 0; }
    .reason { background: #ffebee; padding: 12px 16px; border-radius: 6px; font-family: monospace; font-size: 13px; }
    p { line-height: 1.6; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <h2>Connection failed</h2>
  <div class="reason" id="reason">Unknown error</div>
  <p id="hint"></p>
  <script>
    const params = new URLSearchParams(location.search);
    const reason = params.get("reason") || "unknown";
    document.getElementById("reason").textContent = decodeURIComponent(reason);

    const hints = {
      no_jwt: "You don't appear to be logged in to Faces. Please log in and try connecting again.",
      exchange_failed: "The connection could not be completed. Please try again.",
      "Invalid or expired OAuth state": "The authorization took too long (over 5 minutes). Please try again."
    };
    const hint = hints[reason] || "Please try again. If the problem persists, contact support.";
    document.getElementById("hint").textContent = hint;
  </script>
</body>
</html>
